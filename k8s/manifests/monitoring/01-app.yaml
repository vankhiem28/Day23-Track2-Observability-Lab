---
apiVersion: v1
kind: ConfigMap
metadata:
  name: inference-api-config
  namespace: monitoring
data:
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_SERVICE_NAME: "inference-api"
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=lab,service.namespace=aicb"
  LOG_LEVEL: "INFO"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
  namespace: monitoring
  labels:
    app: inference-api
    tier: app
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: inference-api
  template:
    metadata:
      labels:
        app: inference-api
        tier: app
    spec:
      containers:
        - name: inference-api
          image: day23-inference-api:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: inference-api-config
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          startupProbe:
            httpGet: { path: /healthz, port: http }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: inference-api
  namespace: monitoring
  labels:
    app: inference-api
spec:
  type: ClusterIP
  selector:
    app: inference-api
  ports:
    - name: http
      port: 8000
      targetPort: http
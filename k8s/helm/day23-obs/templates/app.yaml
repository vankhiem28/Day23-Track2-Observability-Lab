{{- if .Values.components.app -}}
{{- $ctx := dict "Values" .Values.app "component" "app" "Release" .Release "Chart" .Chart "image" .Values.image "namespace" (include "day23-obs.namespace" .) -}}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "day23-obs.fullname" . }}-app-config
  namespace: {{ include "day23-obs.namespace" . }}
  labels:
    {{- include "day23-obs.labels" . | nindent 4 }}
data:
  OTEL_EXPORTER_OTLP_ENDPOINT: {{ .Values.app.otlpEndpoint | quote }}
  OTEL_SERVICE_NAME: "inference-api"
  OTEL_RESOURCE_ATTRIBUTES: "deployment.environment=lab,service.namespace=aicb"
  LOG_LEVEL: "INFO"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-api
  namespace: {{ include "day23-obs.namespace" . }}
  labels:
    {{- include "day23-obs.labels" . | nindent 4 }}
    app: inference-api
    tier: app
spec:
  replicas: {{ .Values.app.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: inference-api
  template:
    metadata:
      labels:
        {{- include "day23-obs.labels" . | nindent 8 }}
        app: inference-api
        tier: app
    spec:
      containers:
        - name: inference-api
          image: {{ .Values.app.image }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "day23-obs.fullname" . }}-app-config
          resources:
            {{- toYaml .Values.app.resources | nindent 12 }}
          startupProbe:
            httpGet: { path: /healthz, port: http }
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: inference-api
  namespace: {{ include "day23-obs.namespace" . }}
  labels:
    {{- include "day23-obs.labels" . | nindent 4 }}
    app: inference-api
spec:
  type: ClusterIP
  selector:
    app: inference-api
  ports:
    - name: http
      port: 8000
      targetPort: http
{{- end }}